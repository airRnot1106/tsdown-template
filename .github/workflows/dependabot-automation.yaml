name: Dependabot Automation

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-automation:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    timeout-minutes: 30
    steps:
      # Generate a token from the airrnot-ci-bot GitHub App so that pushes
      # trigger downstream workflows (the default GITHUB_TOKEN does not).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CI_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # When npm dependencies change, pnpm-lock.yaml is updated and the
      # pnpmDeps hash in package.nix becomes stale. Re-compute it via
      # nix-update and push the fix back to the PR branch.
      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Update pnpmDeps hash
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        run: nix run nixpkgs#nix-update -- --flake --version=skip default
      # Use the REST API to create a verified commit signed by GitHub on
      # behalf of the airrnot-ci-bot App.
      - name: Commit & push if package.nix changed
        if: steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet package.nix; then
            exit 0
          fi
          PARENT_SHA=$(git rev-parse HEAD)
          BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
            --method POST \
            -f "content=$(base64 -w0 < package.nix)" \
            -f "encoding=base64" \
            --jq '.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${PARENT_SHA}" --jq '.tree.sha')
          NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
            --method POST \
            -f "base_tree=${BASE_TREE}" \
            -f "tree[][path]=package.nix" \
            -f "tree[][mode]=100644" \
            -f "tree[][type]=blob" \
            -f "tree[][sha]=${BLOB_SHA}" \
            --jq '.sha')
          COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
            --method POST \
            -f "message=chore: update pnpmDeps hash" \
            -f "tree=${NEW_TREE}" \
            -f "parents[]=${PARENT_SHA}" \
            --jq '.sha')
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            -f "sha=${COMMIT_SHA}"
      # Auto-merge conditions (any one match triggers auto-merge):
      #   1. Any Nix flake input update.
      #   2. Any patch-level version bump (e.g. 1.2.3 -> 1.2.4).
      #   3. Minor bump of a direct development dependency (devDependencies).
      #   4. Grouped update PR (e.g. "bump the npm_and_yarn group ...") that
      #      does not include any major bump.
      - name: Approve & enable auto-merge for Dependabot PR
        if: |
          steps.metadata.outputs.package-ecosystem == 'nix' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'direct:development') ||
          (steps.metadata.outputs.dependency-group-name != '' && steps.metadata.outputs.update-type != 'version-update:semver-major')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
