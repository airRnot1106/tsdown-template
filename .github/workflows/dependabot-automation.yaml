name: Dependabot Automation

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-automation:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    timeout-minutes: 13
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Auto-merge conditions (any one match triggers auto-merge):
      #   1. Any Nix flake input update.
      #   2. Any patch-level version bump (e.g. 1.2.3 -> 1.2.4).
      #   3. Minor bump of a direct development dependency (devDependencies).
      #   4. Grouped update PR (e.g. "bump the npm_and_yarn group ...") that
      #      does not include any major bump.
      - name: Approve & enable auto-merge for Dependabot PR
        if: |
          steps.metadata.outputs.package-ecosystem == 'nix' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'direct:development') ||
          (steps.metadata.outputs.dependency-group-name != '' && steps.metadata.outputs.update-type != 'version-update:semver-major')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
